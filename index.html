function LineSpark({ points, width = 560, height = 120, color }) {
  if (!points.length) return null;
  const max = Math.max(...points, 1);
  const min = Math.min(...points, 0);
  const range = Math.max(max - min, 1);
  const stepX = points.length > 1 ? width / (points.length - 1) : width;
  const coords = points.map((v, i) => {
    const x = points.length > 1 ? i * stepX : width / 2;
    const y = height - ((v - min) / range) * (height - 16) - 8;
    return [x, y];
  });
  const pathD = coords.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
  const areaD = `${pathD} L${coords[coords.length - 1][0].toFixed(1)},${height} L0,${height} Z`;
  const gid = "grad-" + Math.random().toString(36).slice(2, 8);

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaD} fill={`url(#${gid})`} stroke="none" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {coords.map(([x, y], i) => <circle key={i} cx={x} cy={y} r="3" fill={color} />)}
    </svg>
  );
}

function InsightsScreen({ workflows, activeId, runs, profiles, onSelectWorkflow, onClose, onDeleteRun, onUpdateRun }) {
  const [showAll, setShowAll] = useState(false);
  const [editingRunId, setEditingRunId] = useState(null);
  const wf = workflows.find((w) => w.id === activeId) || workflows[0];
  const wfRuns = useMemo(
    () => runs.filter((r) => r.workflowId === wf.id).sort((a, b) => new Date(a.completedAt) - new Date(b.completedAt)),
    [runs, wf.id]
  );

  const exportCsv = () => {
    const header = "Date,Completed By,Total Seconds,Total Time\n";
    const rows = wfRuns.map((r) => {
      const name = displayNameFor(r.completedByUid, profiles, r.completedBy);
      return `"${r.completedAt}","${name}",${Math.round(r.totalSeconds)},"${formatTime(r.totalSeconds)}"`;
    }).join("\n");
    const blob = new Blob([header + rows], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${(wf.title || "workflow").replace(/[^a-z0-9]+/gi, "_")}_runs.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  if (wfRuns.length === 0) {
    return (
      <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 fade-in">
        <ScreenHeader title="Insights" onClose={onClose} />
        <WorkflowSelect workflows={workflows} activeId={wf.id} onSelect={onSelectWorkflow} />
        <div className="flex-1 flex flex-col items-center justify-center text-center py-16">
          <Timer size={32} style={{ color: COLORS.textFaint }} className="mb-4" />
          <p style={{ color: COLORS.textMuted }} className="text-lg font-semibold mb-1">No runs yet</p>
          <p style={{ color: COLORS.textFaint }} className="text-sm max-w-sm">Complete this workflow once to start seeing trends, averages, and per-step breakdowns here.</p>
        </div>
      </div>
    );
  }

  const totals = wfRuns.map((r) => r.totalSeconds);
  const avgTotal = totals.reduce((a, b) => a + b, 0) / totals.length;
  const fastest = Math.min(...totals);
  const slowest = Math.max(...totals);

  const stepAgg = {};
  wfRuns.forEach((r) => {
    (r.stepOrder || Object.keys(r.stepTimes)).forEach((sid) => {
      const t = r.stepTimes[sid];
      if (t == null) return;
      if (!stepAgg[sid]) stepAgg[sid] = { label: r.stepLabels[sid] || "Step", total: 0, count: 0 };
      stepAgg[sid].total += t;
      stepAgg[sid].count += 1;
    });
  });
  const stepAvgs = Object.values(stepAgg)
    .map((s) => ({ label: s.label, avg: s.total / s.count }))
    .sort((a, b) => b.avg - a.avg);
  const maxStepAvg = Math.max(...stepAvgs.map((s) => s.avg), 1);

  const recent = [...wfRuns].reverse().slice(0, 8);

  return (
    <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 overflow-y-auto fade-in">
      <ScreenHeader title="Insights" onClose={onClose} />
      <div className="flex items-center justify-between gap-3 flex-wrap mb-6">
        <WorkflowSelect workflows={workflows} activeId={wf.id} onSelect={onSelectWorkflow} noMargin />
        <button onClick={exportCsv} style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-xl border px-3 py-2.5 text-xs font-semibold hover:opacity-80 transition-opacity">
          Export CSV
        </button>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
        <StatCard label="Runs" value={wfRuns.length} color={COLORS.textPrimary} />
        <StatCard label="Avg time" value={formatTime(avgTotal)} color={COLORS.teal} />
        <StatCard label="Fastest" value={formatTime(fastest)} color={COLORS.teal} />
        <StatCard label="Slowest" value={formatTime(slowest)} color={COLORS.orange} />
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Total time per run</p>
        <LineSpark points={totals} color={COLORS.teal} />
        <div className="flex justify-between mt-2">
          <span style={{ color: COLORS.textFaint }} className="font-mono text-[11px]">Run 1</span>
          <span style={{ color: COLORS.textFaint }} className="font-mono text-[11px]">Run {wfRuns.length}</span>
        </div>
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Average time per step (slowest first)</p>
        <div className="flex flex-col gap-3">
          {stepAvgs.map((s, i) => (
            <div key={i} className="flex items-center gap-3">
              <span style={{ color: COLORS.textMuted }} className="text-sm flex-1 truncate" title={s.label}>{s.label}</span>
              <div className="w-28 h-1.5 rounded-full shrink-0" style={{ backgroundColor: COLORS.border }}>
                <div className="h-1.5 rounded-full" style={{ width: `${Math.max(4, (s.avg / maxStepAvg) * 100)}%`, backgroundColor: COLORS.orange }} />
              </div>
              <span style={{ color: COLORS.orange }} className="font-mono text-xs w-14 text-right shrink-0">{formatTime(s.avg)}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-4">
        <div className="flex items-center justify-between mb-4">
          <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase">All runs ({wfRuns.length})</p>
          {wfRuns.length > 8 && (
            <button onClick={() => setShowAll((s) => !s)} style={{ color: COLORS.teal }} className="font-mono text-[11px] tracking-wide hover:opacity-80">
              {showAll ? "Show fewer" : `Show all ${wfRuns.length}`}
            </button>
          )}
        </div>
        <div className="flex flex-col gap-1">
          {(showAll ? [...wfRuns].reverse() : recent).map((r) => (
            <RunRow key={r.id} run={r} profiles={profiles} isOpen={editingRunId === r.id}
              onToggle={() => setEditingRunId((id) => (id === r.id ? null : r.id))}
              onDelete={() => { if (window.confirm("Delete this run? This can't be undone.")) onDeleteRun(r.id); }}
              onSave={(updated) => { onUpdateRun(updated); setEditingRunId(null); }} />
          ))}
        </div>
      </div>
    </div>
  );
}

function RunRow({ run, profiles, isOpen, onToggle, onDelete, onSave }) {
  const stepIds = run.stepOrder || Object.keys(run.stepTimes || {});
  const [editing, setEditing] = useState(false);
  const [minutes, setMinutes] = useState(() => {
    const m = {};
    stepIds.forEach((sid) => { m[sid] = ((run.stepTimes && run.stepTimes[sid]) || 0) / 60; });
    return m;
  });

  const startEdit = () => {
    const m = {};
    stepIds.forEach((sid) => { m[sid] = ((run.stepTimes && run.stepTimes[sid]) || 0) / 60; });
    setMinutes(m);
    setEditing(true);
  };

  const commit = () => {
    const newStepTimes = {};
    let total = 0;
    stepIds.forEach((sid) => {
      const secs = Math.max(0, (parseFloat(minutes[sid]) || 0) * 60);
      newStepTimes[sid] = secs;
      total += secs;
    });
    onSave({ ...run, stepTimes: newStepTimes, totalSeconds: total });
    setEditing(false);
  };

  return (
    <div style={{ borderColor: COLORS.border }} className="border-b last:border-b-0 py-2">
      <div className="flex items-center justify-between gap-3">
        <button onClick={onToggle} className="flex-1 text-left flex items-center gap-2 min-w-0">
          {isOpen ? <ChevronUp size={13} style={{ color: COLORS.textFaint }} /> : <ChevronDown size={13} style={{ color: COLORS.textFaint }} />}
          <span style={{ color: COLORS.textMuted }} className="font-mono text-xs truncate">
            {formatDateShort(run.completedAt)}{run.completedBy ? ` · ${displayNameFor(run.completedByUid, profiles, run.completedBy)}` : ""}
          </span>
        </button>
        <div className="flex items-center gap-2 shrink-0">
          <span style={{ color: COLORS.textPrimary }} className="font-mono text-xs font-semibold">{formatTime(run.totalSeconds)}</span>
          <button onClick={onDelete} aria-label="Delete run" style={{ color: COLORS.textFaint }} className="hover:opacity-70"><X size={14} /></button>
        </div>
      </div>

      {isOpen && !editing && (
        <div style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border }} className="rounded-xl border p-3 mt-2 flex flex-col gap-1.5">
          {stepIds.map((sid) => (
            <div key={sid} className="flex items-center justify-between gap-2">
              <span style={{ color: COLORS.textMuted }} className="text-xs flex-1 truncate">{(run.stepLabels && run.stepLabels[sid]) || "Step"}</span>
              <span style={{ color: COLORS.orange }} className="font-mono text-xs shrink-0">{formatTime((run.stepTimes && run.stepTimes[sid]) || 0)}</span>
            </div>
          ))}
          <button onClick={startEdit} style={{ color: COLORS.teal }} className="font-mono text-[11px] tracking-wide hover:opacity-80 mt-1.5 text-left">
            Edit these times
          </button>
        </div>
      )}

      {isOpen && editing && (
        <div style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border }} className="rounded-xl border p-3 mt-2 flex flex-col gap-2">
          {stepIds.map((sid) => (
            <div key={sid} className="flex items-center gap-2">
              <span style={{ color: COLORS.textMuted }} className="text-xs flex-1 truncate">{(run.stepLabels && run.stepLabels[sid]) || "Step"}</span>
              <input type="number" min="0" step="0.1" value={minutes[sid]}
                onChange={(e) => setMinutes((m) => ({ ...m, [sid]: e.target.value }))}
                style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border, color: COLORS.textPrimary }}
                className="w-20 rounded-lg border px-2 py-1 text-xs outline-none focus:ring-2" />
              <span style={{ color: COLORS.textFaint }} className="text-[10px] font-mono">min</span>
            </div>
          ))}
          <div className="flex gap-2 mt-1">
            <button onClick={() => setEditing(false)} style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="flex-1 rounded-lg border py-2 text-xs font-semibold hover:opacity-80">
              Cancel
            </button>
            <button onClick={commit} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="flex-1 rounded-lg py-2 text-xs font-semibold hover:brightness-110 transition-all">
              Save changes
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function ScreenHeader({ title, onClose }) {
  return (
    <div className="flex items-center justify-between mb-6">
      <h2 style={{ color: COLORS.textPrimary }} className="text-2xl sm:text-3xl font-bold">{title}</h2>
      <button onClick={onClose} aria-label="Close" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><X size={18} /></button>
    </div>
  );
}

function WorkflowSelect({ workflows, activeId, onSelect, noMargin }) {
  return (
    <select
      value={activeId}
      onChange={(e) => onSelect(e.target.value)}
      style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
      className={`rounded-xl border px-4 py-2.5 text-sm font-medium outline-none focus:ring-2 w-full sm:w-auto ${noMargin ? "" : "mb-6"}`}
    >
      {workflows.map((w) => <option key={w.id} value={w.id}>{w.title || "Untitled workflow"}</option>)}
    </select>
  );
}

function StatCard({ label, value, color }) {
  return (
    <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border px-4 py-4">
      <p style={{ color: COLORS.textFaint }} className="font-mono text-[10px] tracking-[0.15em] uppercase mb-1">{label}</p>
      <p style={{ color }} className="text-xl font-bold font-mono">{value}</p>
    </div>
  );
}

/* -------------------------- EDIT MODE -------------------------- */

function EditMode({ workflow, isNew, stepTimes, channels, onSave, onCancel }) {
  const [title, setTitle] = useState(workflow.title);
  const [channelId, setChannelId] = useState(workflow.channelId || "");
  const [steps, setSteps] = useState((workflow.steps || []).map((s) => ({ id: s.id, text: s.text, substeps: (s.substeps || []).map((sub) => ({ id: sub.id, text: sub.text })) })));
  const [newStep, setNewStep] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editingText, setEditingText] = useState("");
  const [expanded, setExpanded] = useState({});
  const [newSubstepText, setNewSubstepText] = useState({});
  const [bulkOpen, setBulkOpen] = useState(false);
  const [bulkText, setBulkText] = useState("");

  const addStep = () => {
    const text = newStep.trim();
    if (!text) return;
    setSteps((s) => [...s, { id: uid(), text, substeps: [] }]);
    setNewStep("");
  };

  const addBulk = () => {
    const lines = bulkText.split("\n").map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return;
    setSteps((s) => [...s, ...lines.map((text) => ({ id: uid(), text, substeps: [] }))]);
    setBulkText("");
    setBulkOpen(false);
  };

  const removeStep = (id) => setSteps((s) => s.filter((st) => st.id !== id));
  const duplicateStep = (id) => {
    setSteps((s) => {
      const idx = s.findIndex((st) => st.id === id);
      if (idx === -1) return s;
      const copy = { ...s[idx], id: uid(), text: s[idx].text + " (copy)", substeps: s[idx].substeps.map((sub) => ({ id: uid(), text: sub.text })) };
      const next = [...s];
      next.splice(idx + 1, 0, copy);
      return next;
    });
  };
  const move = (id, dir) => {
    setSteps((s) => {
      const idx = s.findIndex((st) => st.id === id);
      const swapWith = idx + dir;
      if (swapWith < 0 || swapWith >= s.length) return s;
      const copy = [...s];
      [copy[idx], copy[swapWith]] = [copy[swapWith], copy[idx]];
      return copy;
    });
  };
  const startEdit = (st) => { setEditingId(st.id); setEditingText(st.text); };
  const commitEdit = () => {
    setSteps((s) => s.map((st) => (st.id === editingId ? { ...st, text: editingText.trim() || st.text } : st)));
    setEditingId(null); setEditingText("");
  };
  const toggleExpand = (id) => setExpanded((e) => ({ ...e, [id]: !e[id] }));
  const addSubstep = (stepId) => {
    const text = (newSubstepText[stepId] || "").trim();
    if (!text) return;
    setSteps((s) => s.map((st) => (st.id === stepId ? { ...st, substeps: [...st.substeps, { id: uid(), text }] } : st)));
    setNewSubstepText((n) => ({ ...n, [stepId]: "" }));
  };
  const removeSubstep = (stepId, subId) => {
    setSteps((s) => s.map((st) => (st.id === stepId ? { ...st, substeps: st.substeps.filter((sub) => sub.id !== subId) } : st)));
  };
  const editSubstepText = (stepId, subId, text) => {
    setSteps((s) => s.map((st) => (st.id === stepId ? { ...st, substeps: st.substeps.map((sub) => (sub.id === subId ? { ...sub, text } : sub)) } : st)));
  };

  const canSave = title.trim().length > 0 && steps.length > 0;
  const handleSave = () => {
    if (!canSave) return;
    onSave({ id: workflow.id, title: title.trim(), steps, channelId: channelId || null });
  };

  return (
    <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 fade-in">
      <div className="flex items-center justify-between mb-8">
        <h2 style={{ color: COLORS.textPrimary }} className="text-2xl sm:text-3xl font-bold">{isNew ? "New Workflow" : "Edit Workflow"}</h2>
        <button onClick={onCancel} aria-label="Cancel" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><X size={18} /></button>
      </div>

      <label style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-2">Title</label>
      <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Workflow title"
        style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
        className="w-full rounded-xl border px-4 py-3 mb-4 text-lg font-semibold outline-none focus:ring-2" />

      <label style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-2">Channel</label>
      <select value={channelId} onChange={(e) => setChannelId(e.target.value)}
        style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
        className="w-full rounded-xl border px-4 py-3 mb-8 text-sm outline-none focus:ring-2">
        <option value="">No channel</option>
        {(channels || []).map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
      </select>

      <div className="flex items-center justify-between mb-3">
        <label style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase">Steps ({steps.length})</label>
        <button onClick={() => setBulkOpen((b) => !b)} style={{ backgroundColor: bulkOpen ? COLORS.tealSoft : "transparent", color: COLORS.teal, borderColor: COLORS.teal }} className="font-mono text-[11px] tracking-wide hover:brightness-110 flex items-center gap-1.5 rounded-lg border px-2.5 py-1 transition-all">
          <ListChecks size={13} />
          {bulkOpen ? "Close paste-in" : "Paste multiple steps"}
        </button>
      </div>

      {bulkOpen && (
        <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-xl border p-4 mb-4">
          <textarea value={bulkText} onChange={(e) => setBulkText(e.target.value)} rows={5} placeholder={"One step per line, e.g.\nCut Video\nTranscribe\nExport As Text File"}
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="w-full rounded-lg border px-3 py-2 text-sm outline-none focus:ring-2 mb-3" />
          <button onClick={addBulk} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="rounded-lg px-4 py-2 text-sm font-semibold hover:brightness-110 transition-all">
            Add {bulkText.split("\n").map((l) => l.trim()).filter(Boolean).length || ""} step{bulkText.trim() ? "s" : ""}
          </button>
        </div>
      )}

      <div className="flex flex-col gap-2 mb-4">
        {steps.length === 0 && <p style={{ color: COLORS.textFaint }} className="text-sm italic py-4 text-center">No steps yet. Add your first step below.</p>}
        {steps.map((st, i) => {
          const t = stepTimes[st.id];
          const isExpanded = !!expanded[st.id];
          return (
            <div key={st.id} style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-xl border overflow-hidden">
              <div className="flex items-center gap-2 px-3 py-2.5">
                <GripVertical size={16} style={{ color: COLORS.textFaint }} className="shrink-0" />
                <span style={{ color: COLORS.textFaint }} className="font-mono text-xs w-6 shrink-0">{String(i + 1).padStart(2, "0")}</span>
                {editingId === st.id ? (
                  <input autoFocus value={editingText} onChange={(e) => setEditingText(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && commitEdit()} onBlur={commitEdit}
                    style={{ backgroundColor: COLORS.bgElevated, color: COLORS.textPrimary }}
                    className="flex-1 rounded-lg px-3 py-1.5 text-sm outline-none" />
                ) : (
                  <button onClick={() => startEdit(st)} style={{ color: COLORS.textPrimary }} className="flex-1 text-left text-sm py-1.5 truncate" title="Click to edit">{st.text}</button>
                )}
                {t != null && <span style={{ color: COLORS.orange }} className="font-mono text-[11px] shrink-0">{formatTime(t)}</span>}
                <div className="flex items-center gap-1 shrink-0">
                  <button onClick={() => toggleExpand(st.id)} aria-label="Substeps" style={{ color: st.substeps.length ? COLORS.violet : COLORS.textMuted }} className="p-1.5 hover:opacity-70 flex items-center gap-0.5">
                    <ListChecks size={15} />
                    {st.substeps.length > 0 && <span className="font-mono text-[10px]">{st.substeps.length}</span>}
                    {isExpanded ? <ChevronUp size={13} /> : <ChevronDown size={13} />}
                  </button>
                  <button onClick={() => move(st.id, -1)} disabled={i === 0} aria-label="Move up" style={{ color: COLORS.textMuted, opacity: i === 0 ? 0.3 : 1 }} className="p-1.5 hover:opacity-70 disabled:cursor-not-allowed"><ChevronUp size={16} /></button>
                  <button onClick={() => move(st.id, 1)} disabled={i === steps.length - 1} aria-label="Move down" style={{ color: COLORS.textMuted, opacity: i === steps.length - 1 ? 0.3 : 1 }} className="p-1.5 hover:opacity-70 disabled:cursor-not-allowed"><ChevronDown size={16} /></button>
                  <button onClick={() => duplicateStep(st.id)} aria-label="Duplicate step" style={{ color: COLORS.textMuted }} className="p-1.5 hover:opacity-70"><Copy size={16} /></button>
                  <button onClick={() => removeStep(st.id)} aria-label="Delete step" style={{ color: COLORS.danger }} className="p-1.5 hover:opacity-70"><Trash2 size={16} /></button>
                </div>
              </div>

              {isExpanded && (
                <div style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border }} className="border-t px-4 py-3 pl-11">
                  <p style={{ color: COLORS.textFaint }} className="font-mono text-[10px] tracking-[0.15em] uppercase mb-2">Sub-steps for this step</p>
                  <div className="flex flex-col gap-1.5 mb-2">
                    {st.substeps.map((sub) => (
                      <div key={sub.id} className="flex items-center gap-2">
                        <span style={{ color: COLORS.violet }} className="text-xs">•</span>
                        <input value={sub.text} onChange={(e) => editSubstepText(st.id, sub.id, e.target.value)}
                          style={{ backgroundColor: COLORS.bgCard, color: COLORS.textPrimary, borderColor: COLORS.border }}
                          className="flex-1 rounded-lg border px-2.5 py-1.5 text-xs outline-none focus:ring-2" />
                        <button onClick={() => removeSubstep(st.id, sub.id)} aria-label="Remove sub-step" style={{ color: COLORS.danger }} className="p-1 hover:opacity-70"><X size={14} /></button>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-2">
                    <input value={newSubstepText[st.id] || ""} onChange={(e) => setNewSubstepText((n) => ({ ...n, [st.id]: e.target.value }))}
                      onKeyDown={(e) => e.key === "Enter" && addSubstep(st.id)}
                      placeholder="Add a sub-step…"
                      style={{ backgroundColor: COLORS.bgCard, color: COLORS.textPrimary, borderColor: COLORS.border }}
                      className="flex-1 rounded-lg border px-2.5 py-1.5 text-xs outline-none focus:ring-2" />
                    <button onClick={() => addSubstep(st.id)} style={{ backgroundColor: COLORS.violetSoft, color: COLORS.violet }} className="rounded-lg px-3 py-1.5 text-xs font-semibold hover:brightness-110 transition-all">Add</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="flex gap-2 mb-10">
        <input value={newStep} onChange={(e) => setNewStep(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addStep()}
          placeholder="Add a new step…" style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
          className="flex-1 rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
        <button onClick={addStep} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="flex items-center gap-1.5 rounded-xl px-4 py-3 text-sm font-semibold hover:brightness-110 transition-all">
          <Plus size={16} /> Add
        </button>
      </div>

      <div className="mt-auto flex gap-3 sticky bottom-0 pt-4">
        <button onClick={onCancel} style={{ borderColor: COLORS.border, color: COLORS.textMuted, backgroundColor: COLORS.bg }} className="flex-1 rounded-2xl border py-4 text-base font-semibold hover:opacity-80 transition-opacity">Cancel</button>
        <button onClick={handleSave} disabled={!canSave} style={{ backgroundColor: COLORS.teal, color: "#04211D", opacity: canSave ? 1 : 0.4 }}
          className="flex-[1.4] flex items-center justify-center gap-2 rounded-2xl py-4 text-base font-bold transition-all duration-200 active:scale-[0.98] disabled:cursor-not-allowed">
          <Check size={18} /> Save Workflow
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
