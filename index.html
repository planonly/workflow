function uid() { return Math.random().toString(36).slice(2, 10); }

function makeDefaultWorkflow() {
  return { id: uid(), title: "Video Publishing Workflow", steps: DEFAULT_STEPS.map((t) => ({ id: uid(), text: t, substeps: [] })) };
}

function formatTime(totalSeconds) {
  const s = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
}

function formatHours(totalSeconds) {
  const h = totalSeconds / 3600;
  return h >= 10 ? `${Math.round(h)}h` : `${h.toFixed(1)}h`;
}

function formatDateShort(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " " +
      d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  } catch (e) { return ""; }
}

function dayKey(iso) {
  try { return new Date(iso).toISOString().slice(0, 10); } catch (e) { return ""; }
}

function displayNameFor(uidVal, profiles, fallbackEmail) {
  if (profiles && profiles[uidVal] && profiles[uidVal].displayName) return profiles[uidVal].displayName;
  if (fallbackEmail) return fallbackEmail.split("@")[0];
  return "Unknown";
}

/* ------------------------- Local storage ------------------------- */
const K_WORKFLOWS = "wfc_workflows_v2";
const K_ACTIVE = "wfc_active_v2";
const K_PROGRESS = "wfc_progress_v2";
const K_RUNS = "wfc_runs_v2";
const K_PROFILES = "wfc_profiles_v2";
const K_CHANNELS = "wfc_channels_v2";

function lsGet(key) { try { return window.localStorage.getItem(key); } catch (e) { return null; } }
function lsSet(key, value) { try { window.localStorage.setItem(key, value); } catch (e) {} }

function normalizeSteps(steps) {
  return (steps || []).map((s) => {
    if (typeof s === "string") return { id: uid(), text: s, substeps: [] };
    return {
      id: s.id || uid(),
      text: s.text,
      substeps: (s.substeps || []).map((sub) => (typeof sub === "string" ? { id: uid(), text: sub } : { id: sub.id || uid(), text: sub.text })),
    };
  });
}

function migrateLegacy() {
  const legacyWf = lsGet("wfc_workflow");
  if (!legacyWf) return null;
  try {
    const parsed = JSON.parse(legacyWf);
    const steps = normalizeSteps(parsed.steps);
    const wf = { id: uid(), title: parsed.title || "My Workflow", steps };
    const idx = parseInt(lsGet("wfc_currentStepIndex") || "0", 10) || 0;
    const done = lsGet("wfc_isComplete") === "true";
    let times = {};
    try { times = JSON.parse(lsGet("wfc_stepTimes") || "{}"); } catch (e) {}
    return { workflow: wf, stepIndex: idx, isComplete: done, stepTimes: times };
  } catch (e) { return null; }
}

/* ============================ AUTH ============================ */

function LoginScreen() {
  const [mode, setMode] = useState("signin");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [inviteCode, setInviteCode] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [resetSent, setResetSent] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setBusy(true); setResetSent(false);
    try {
      if (mode === "signin") {
        await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
      } else {
        let requiredCode = "";
        try {
          const snap = await firebase.firestore().collection("public").doc("settings").get();
          if (snap.exists) requiredCode = snap.data().inviteCode || "";
        } catch (e2) {}
        if (requiredCode && inviteCode.trim() !== requiredCode) {
          setError("That team code doesn't match. Ask a teammate for the current code.");
          setBusy(false);
          return;
        }
        const cred = await firebase.auth().createUserWithEmailAndPassword(email.trim(), password);
        const displayName = name.trim() || email.split("@")[0];
        await cred.user.updateProfile({ displayName });
        await firebase.firestore().collection("sharedData").doc("workflowController").set({
          profiles: { [cred.user.uid]: { displayName, email: email.trim() } },
        }, { merge: true });
      }
    } catch (err) {
      setError((err && err.message ? err.message : "Something went wrong").replace("Firebase: ", ""));
    }
    setBusy(false);
  };

  const forgotPassword = async () => {
    if (!email.trim()) { setError("Enter your email above first, then tap this again."); return; }
    setError("");
    try {
      await firebase.auth().sendPasswordResetEmail(email.trim());
      setResetSent(true);
    } catch (err) {
      setError((err && err.message ? err.message : "Couldn't send reset email").replace("Firebase: ", ""));
    }
  };

  return (
    <div style={{ backgroundColor: COLORS.bg }} className="min-h-screen w-full flex items-center justify-center px-6">
      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="w-full max-w-sm rounded-2xl border p-8 fade-in">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-2">Workflow Controller</p>
        <h1 style={{ color: COLORS.textPrimary }} className="text-2xl font-bold mb-6">{mode === "signin" ? "Sign in" : "Create account"}</h1>
        <form onSubmit={submit} className="flex flex-col gap-3">
          {mode === "signup" && (
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Your name"
              style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
              className="rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
          )}
          <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email"
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
          <input type="password" required minLength={6} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password"
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
          {mode === "signup" && (
            <input value={inviteCode} onChange={(e) => setInviteCode(e.target.value)} placeholder="Team code (ask a teammate)"
              style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
              className="rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
          )}
          {error && <p style={{ color: COLORS.danger }} className="text-xs">{error}</p>}
          {resetSent && <p style={{ color: COLORS.teal }} className="text-xs">Reset email sent — check your inbox.</p>}
          <button type="submit" disabled={busy} style={{ backgroundColor: COLORS.teal, color: "#04211D", opacity: busy ? 0.6 : 1 }}
            className="rounded-xl py-3 text-sm font-bold mt-2 transition-all active:scale-[0.98]">
            {busy ? "Please wait…" : mode === "signin" ? "Sign In" : "Create Account"}
          </button>
        </form>
        {mode === "signin" && (
          <button onClick={forgotPassword} style={{ color: COLORS.textFaint }} className="text-xs mt-4 w-full text-center hover:opacity-80">
            Forgot password?
          </button>
        )}
        <button onClick={() => { setMode(mode === "signin" ? "signup" : "signin"); setError(""); setResetSent(false); }} style={{ color: COLORS.textMuted }} className="text-xs mt-3 w-full text-center hover:opacity-80">
          {mode === "signin" ? "New here? Create an account" : "Already have an account? Sign in"}
        </button>
        <p style={{ color: COLORS.textFaint }} className="text-[11px] mt-6 text-center leading-relaxed">
          You and anyone else who signs in here share the same workflows and run history.
        </p>
      </div>
    </div>
  );
}

function Root() {
  const [authUser, setAuthUser] = useState(undefined);

  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged((u) => setAuthUser(u || null));
    return unsub;
  }, []);

  if (authUser === undefined) {
    return (
      <div style={{ backgroundColor: COLORS.bg, color: COLORS.textMuted }} className="min-h-screen w-full flex items-center justify-center font-mono text-sm tracking-widest">
        LOADING…
      </div>
    );
  }
  if (!authUser) return <LoginScreen />;
  return <WorkflowController user={authUser} />;
}

/* ======================= MAIN APP ======================= */

function WorkflowController({ user }) {
  const [workflows, setWorkflows] = useState(null);
  const [activeId, setActiveId] = useState(null);
  const [progress, setProgress] = useState({});
  const [runs, setRuns] = useState([]);
  const [profiles, setProfiles] = useState({});
  const [channels, setChannels] = useState([]);
  const [mode, setMode] = useState("dashboard");
  const [activeChannelId, setActiveChannelId] = useState(null);
  const [selectedDayKey, setSelectedDayKey] = useState(() => new Date().toISOString().slice(0, 10));
  const [dayViewChannelId, setDayViewChannelId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [direction, setDirection] = useState("forward");
  const [animKey, setAnimKey] = useState(0);
  const [syncStatus, setSyncStatus] = useState("ok"); // ok | error
  const [, forceTick] = useState(0);
  const segmentStartRef = useRef(Date.now());
  const saveTimer = useRef(null);
  const isRemoteRef = useRef(false);

  useEffect(() => {
    let wfs = null, active = null, prog = {}, runHistory = [], prof = {}, chans = null;
    const rawWfs = lsGet(K_WORKFLOWS);
    if (rawWfs) { try { wfs = JSON.parse(rawWfs); } catch (e) {} }
    if (!wfs || !wfs.length) {
      const migrated = migrateLegacy();
      if (migrated) {
        wfs = [migrated.workflow];
        prog[migrated.workflow.id] = { stepIndex: migrated.stepIndex, isComplete: migrated.isComplete, stepTimes: migrated.stepTimes, checkedSubsteps: {} };
      } else {
        wfs = [makeDefaultWorkflow()];
      }
    } else {
      wfs = wfs.map((w) => ({ ...w, steps: normalizeSteps(w.steps) }));
    }
    active = lsGet(K_ACTIVE) || wfs[0].id;
    if (!wfs.find((w) => w.id === active)) active = wfs[0].id;

    const rawProg = lsGet(K_PROGRESS);
    if (rawProg) { try { prog = { ...prog, ...JSON.parse(rawProg) }; } catch (e) {} }
    const rawRuns = lsGet(K_RUNS);
    if (rawRuns) { try { runHistory = JSON.parse(rawRuns); } catch (e) {} }
    const rawProfiles = lsGet(K_PROFILES);
    if (rawProfiles) { try { prof = JSON.parse(rawProfiles); } catch (e) {} }

    const rawChannels = lsGet(K_CHANNELS);
    if (rawChannels) { try { chans = JSON.parse(rawChannels); } catch (e) {} }
    if (!chans) {
      chans = [{ id: uid(), name: "Founding Press", memberUids: [] }];
    }

    setWorkflows(wfs);
    setActiveId(active);
    setProgress(prog);
    setRuns(runHistory);
    setProfiles(prof);
    setChannels(chans);
    segmentStartRef.current = Date.now();
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const docRef = firebase.firestore().collection("sharedData").doc("workflowController");
    const unsub = docRef.onSnapshot(
      (snap) => {
        const data = snap.exists ? snap.data() : null;
        if (data && data.workflows) {
          isRemoteRef.current = true;
          setWorkflows(data.workflows.map((w) => ({ ...w, steps: normalizeSteps(w.steps) })));
          if (data.activeId) setActiveId(data.activeId);
          if (data.progress) setProgress(data.progress);
          if (data.runs) setRuns(data.runs);
          if (data.profiles) setProfiles(data.profiles);
          if (data.channels) setChannels(data.channels);
        } else {
          docRef.set({
            workflows, activeId, progress, runs, channels,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: user.email,
          }, { merge: true }).catch(() => {});
        }
      },
      () => {}
    );
    return unsub;
    // eslint-disable-next-line
  }, [loaded]);

  const persistNow = useCallback((wfs, active, prog, runHistory, prof, chans) => {
    lsSet(K_WORKFLOWS, JSON.stringify(wfs));
    lsSet(K_ACTIVE, active);
    lsSet(K_PROGRESS, JSON.stringify(prog));
    lsSet(K_RUNS, JSON.stringify(runHistory));
    lsSet(K_PROFILES, JSON.stringify(prof));
    lsSet(K_CHANNELS, JSON.stringify(chans));
    if (isRemoteRef.current) { isRemoteRef.current = false; return; }
    firebase.firestore().collection("sharedData").doc("workflowController").set({
      workflows: wfs, activeId: active, progress: prog, runs: runHistory, profiles: prof, channels: chans,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: user.email,
    }, { merge: true }).then(() => setSyncStatus("ok")).catch(() => setSyncStatus("error"));
  }, [user]);

  const persist = useCallback((wfs, active, prog, runHistory, prof, chans) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => persistNow(wfs, active, prog, runHistory, prof, chans), 400);
  }, [persistNow]);

  useEffect(() => {
    if (!loaded) return;
    persist(workflows, activeId, progress, runs, profiles, channels);
  }, [workflows, activeId, progress, runs, profiles, channels, loaded, persist]);

  useEffect(() => {
    if (!loaded) return;
    const id = setInterval(() => persistNow(workflows, activeId, progress, runs, profiles, channels), 5000);
    return () => clearInterval(id);
  }, [loaded, workflows, activeId, progress, runs, profiles, channels, persistNow]);

  // Make sure this user has a profile entry even if they signed up before this feature, or signed in on a new device.
  useEffect(() => {
    if (!loaded) return;
    if (!profiles[user.uid]) {
      setProfiles((p) => ({ ...p, [user.uid]: { displayName: user.displayName || user.email.split("@")[0], email: user.email } }));
    }
  }, [loaded, profiles, user]);

  const activeWorkflow = useMemo(() => {
    if (!workflows) return null;
    return workflows.find((w) => w.id === activeId) || workflows[0];
  }, [workflows, activeId]);

  const activeProgress = (activeWorkflow && progress[activeWorkflow.id]) || { stepIndex: 0, isComplete: false, stepTimes: {}, checkedSubsteps: {}, paused: false };
  const stepIndex = activeProgress.stepIndex || 0;
  const isComplete = !!activeProgress.isComplete;
  const stepTimes = activeProgress.stepTimes || {};
  const checkedSubsteps = activeProgress.checkedSubsteps || {};
  const paused = !!activeProgress.paused;

  const updateActiveProgress = (updater) => {
    setProgress((prev) => {
      const cur = prev[activeWorkflow.id] || { stepIndex: 0, isComplete: false, stepTimes: {}, checkedSubsteps: {}, paused: false };
      const next = updater(cur);
      return { ...prev, [activeWorkflow.id]: next };
    });
  };

  useEffect(() => {
    if (!loaded || mode !== "run" || isComplete || paused || !activeWorkflow) return;
    const id = setInterval(() => forceTick((t) => t + 1), 1000);
    return () => clearInterval(id);
  }, [loaded, mode, isComplete, paused, activeWorkflow]);

  const currentStepId = activeWorkflow && activeWorkflow.steps[stepIndex] ? activeWorkflow.steps[stepIndex].id : null;

  const liveSecondsForCurrent = () => {
    if (!currentStepId) return 0;
    const base = stepTimes[currentStepId] || 0;
    if (paused || isComplete) return base;
    return base + (Date.now() - segmentStartRef.current) / 1000;
  };

  const finalizeCurrentSegment = (times) => {
    if (!currentStepId || paused) return times;
    const elapsed = (Date.now() - segmentStartRef.current) / 1000;
    return { ...times, [currentStepId]: (times[currentStepId] || 0) + elapsed };
  };

  const totalSecondsNow = () => {
    if (!activeWorkflow) return 0;
    let sum = 0;
    for (const s of activeWorkflow.steps) sum += s.id === currentStepId ? 0 : (stepTimes[s.id] || 0);
    return sum + liveSecondsForCurrent();
  };

  const recordRun = (finalTimes) => {
    if (!activeWorkflow) return;
    const total = activeWorkflow.steps.reduce((sum, s) => sum + (finalTimes[s.id] || 0), 0);
    const stepLabels = {};
    activeWorkflow.steps.forEach((s) => { stepLabels[s.id] = s.text; });
    const run = {
      id: uid(),
      workflowId: activeWorkflow.id,
      workflowTitle: activeWorkflow.title,
      completedAt: new Date().toISOString(),
      completedBy: user.email,
      completedByUid: user.uid,
      totalSeconds: total,
      stepTimes: finalTimes,
      stepLabels,
      stepOrder: activeWorkflow.steps.map((s) => s.id),
    };
    setRuns((r) => [...r, run]);
  };

  const goNext = () => {
    if (!activeWorkflow) return;
    updateActiveProgress((cur) => {
      const updatedTimes = finalizeCurrentSegment(cur.stepTimes || {});
      segmentStartRef.current = Date.now();
      if ((cur.stepIndex || 0) >= activeWorkflow.steps.length - 1) {
        recordRun(updatedTimes);
        return { ...cur, stepTimes: updatedTimes, isComplete: true };
      }
      setDirection("forward"); setAnimKey((k) => k + 1);
      return { ...cur, stepTimes: updatedTimes, stepIndex: Math.min((cur.stepIndex || 0) + 1, activeWorkflow.steps.length - 1) };
    });
  };

  const goBack = () => {
    updateActiveProgress((cur) => {
      const updatedTimes = finalizeCurrentSegment(cur.stepTimes || {});
      segmentStartRef.current = Date.now();
      setDirection("backward"); setAnimKey((k) => k + 1);
      return { ...cur, stepTimes: updatedTimes, stepIndex: Math.max((cur.stepIndex || 0) - 1, 0) };
    });
  };

  const togglePause = () => {
    updateActiveProgress((cur) => {
      if (!cur.paused) {
        const updatedTimes = finalizeCurrentSegment(cur.stepTimes || {});
        return { ...cur, stepTimes: updatedTimes, paused: true };
      } else {
        segmentStartRef.current = Date.now();
        return { ...cur, paused: false };
      }
    });
  };

  const toggleSubstep = (substepId) => {
    updateActiveProgress((cur) => {
      const cs = { ...(cur.checkedSubsteps || {}) };
      const arr = new Set(cs[currentStepId] || []);
      if (arr.has(substepId)) arr.delete(substepId); else arr.add(substepId);
      cs[currentStepId] = Array.from(arr);
      return { ...cur, checkedSubsteps: cs };
    });
  };

  const restart = () => {
    setDirection("forward"); setAnimKey((k) => k + 1);
    segmentStartRef.current = Date.now();
    updateActiveProgress(() => ({ stepIndex: 0, isComplete: false, stepTimes: {}, checkedSubsteps: {}, paused: false }));
  };

  const openWorkflow = (id) => {
    setActiveId(id);
    segmentStartRef.current = Date.now();
    setMode("run");
  };

  const createWorkflow = () => { setEditingId("new"); setMode("edit"); };
  const editWorkflow = (id) => { setEditingId(id); setMode("edit"); };

  const deleteWorkflow = (id) => {
    setWorkflows((wfs) => {
      const next = wfs.filter((w) => w.id !== id);
      const finalList = next.length ? next : [makeDefaultWorkflow()];
      if (activeId === id) setActiveId(finalList[0].id);
      return finalList;
    });
    setProgress((p) => { const c = { ...p }; delete c[id]; return c; });
  };

  const duplicateWorkflow = (id) => {
    const src = workflows.find((w) => w.id === id);
    if (!src) return;
    const clone = {
      id: uid(),
      title: src.title + " (copy)",
      channelId: src.channelId || null,
      steps: src.steps.map((s) => ({ id: uid(), text: s.text, substeps: (s.substeps || []).map((sub) => ({ id: uid(), text: sub.text })) })),
    };
    setWorkflows((wfs) => [...wfs, clone]);
  };

  const saveWorkflow = (wfData) => {
    setWorkflows((wfs) => {
      const exists = wfs.find((w) => w.id === wfData.id);
      if (exists) return wfs.map((w) => (w.id === wfData.id ? wfData : w));
      return [...wfs, wfData];
    });
    if (editingId === "new") setActiveId(wfData.id);
    setMode("run");
    setEditingId(null);
  };

  const createChannel = (name) => {
    const ch = { id: uid(), name: name.trim() || "Untitled Channel", memberUids: [] };
    setChannels((c) => [...c, ch]);
    return ch.id;
  };
  const renameChannel = (id, name) => {
    setChannels((c) => c.map((ch) => (ch.id === id ? { ...ch, name: name.trim() || ch.name } : ch)));
  };
  const deleteChannel = (id) => {
    setChannels((c) => c.filter((ch) => ch.id !== id));
    setWorkflows((wfs) => wfs.map((w) => (w.channelId === id ? { ...w, channelId: null } : w)));
    if (activeChannelId === id) { setActiveChannelId(null); setMode("dashboard"); }
  };
  const toggleChannelMember = (channelId, memberUid) => {
    setChannels((c) => c.map((ch) => {
      if (ch.id !== channelId) return ch;
      const members = ch.memberUids || [];
      const has = members.includes(memberUid);
      return { ...ch, memberUids: has ? members.filter((m) => m !== memberUid) : [...members, memberUid] };
    }));
  };
  const openChannel = (id) => { setActiveChannelId(id); setMode("channel"); };
  const openDay = (dk) => { setSelectedDayKey(dk); setDayViewChannelId(null); setMode("day"); };

  const restartWorkflowById = (id) => {
    setProgress((p) => ({ ...p, [id]: { stepIndex: 0, isComplete: false, stepTimes: {}, checkedSubsteps: {}, paused: false } }));
  };

  const deleteRun = (runId) => setRuns((r) => r.filter((x) => x.id !== runId));
  const updateRun = (updatedRun) => setRuns((r) => r.map((x) => (x.id === updatedRun.id ? updatedRun : x)));

  const updateDisplayName = async (newName) => {
    const name = newName.trim();
    if (!name) return;
    try { await user.updateProfile({ displayName: name }); } catch (e) {}
    setProfiles((p) => ({ ...p, [user.uid]: { ...(p[user.uid] || {}), displayName: name, email: user.email } }));
  };

  useEffect(() => {
    if (mode !== "run" || !loaded) return;
    const onKey = (e) => {
      if (isComplete) return;
      const tag = (e.target && e.target.tagName) || "";
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      if (e.code === "Space") { e.preventDefault(); togglePause(); }
      else if (e.code === "ArrowRight") { e.preventDefault(); if (!paused) goNext(); }
      else if (e.code === "ArrowLeft") { e.preventDefault(); if (!paused) goBack(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
    // eslint-disable-next-line
  }, [mode, loaded, isComplete, paused, stepIndex, activeWorkflow]);

  if (!loaded || !workflows || !activeWorkflow) {
    return (
      <div style={{ backgroundColor: COLORS.bg, color: COLORS.textMuted }} className="min-h-screen w-full flex items-center justify-center font-mono text-sm tracking-widest">
        LOADING…
      </div>
    );
  }

  const total = activeWorkflow.steps.length;
  const goHome = () => setMode("dashboard");
  const signOut = () => { if (window.confirm("Sign out?")) firebase.auth().signOut(); };

  return (
    <div style={{ backgroundColor: COLORS.bg, color: COLORS.textPrimary }} className="min-h-screen w-full flex flex-col font-sans">
      {mode === "edit" ? (
        <EditMode
          workflow={editingId === "new" ? { id: uid(), title: "", steps: [], channelId: null } : workflows.find((w) => w.id === editingId)}
          isNew={editingId === "new"}
          stepTimes={editingId === "new" ? {} : (progress[editingId] && progress[editingId].stepTimes) || {}}
          channels={channels}
          onSave={saveWorkflow}
          onCancel={() => { setMode("dashboard"); setEditingId(null); }}
        />
      ) : mode === "channel" ? (
        <ChannelDashboard
          channel={channels.find((c) => c.id === activeChannelId)}
          channels={channels}
          workflows={workflows}
          runs={runs}
          profiles={profiles}
          onRename={renameChannel}
          onDelete={deleteChannel}
          onToggleMember={toggleChannelMember}
          onOpenWorkflow={openWorkflow}
          onOpenDay={(dk) => { setSelectedDayKey(dk); setDayViewChannelId(activeChannelId); setMode("day"); }}
          onBack={goHome}
        />
      ) : mode === "day" ? (
        <DayDetailScreen
          dateKey={selectedDayKey}
          workflows={workflows}
          runs={runs}
          profiles={profiles}
          channels={channels}
          channelId={dayViewChannelId}
          onChangeDate={setSelectedDayKey}
          onBack={() => setMode(dayViewChannelId ? "channel" : "dashboard")}
        />
      ) : mode === "profile" ? (
        <ProfileScreen user={user} profiles={profiles} onUpdateName={updateDisplayName} onBack={goHome} onSignOut={signOut} />
      ) : mode === "insights" ? (
        <InsightsScreen workflows={workflows} activeId={activeId} runs={runs} profiles={profiles} onSelectWorkflow={setActiveId} onClose={goHome} onDeleteRun={deleteRun} onUpdateRun={updateRun} />
      ) : mode === "run" ? (
        isComplete ? (
          <CompleteScreen workflow={activeWorkflow} stepTimes={stepTimes} totalSeconds={totalSecondsNow()} onRestart={restart} onEdit={() => editWorkflow(activeWorkflow.id)} onInsights={() => setMode("insights")} onGoHome={goHome} />
        ) : (
          <RunMode
            workflow={activeWorkflow} stepIndex={stepIndex} total={total} direction={direction} animKey={animKey}
            paused={paused} currentSeconds={liveSecondsForCurrent()} totalSeconds={totalSecondsNow()}
            checkedSubsteps={checkedSubsteps[currentStepId] || []}
            onToggleSubstep={toggleSubstep}
            onNext={goNext} onBack={goBack} onTogglePause={togglePause}
            onEdit={() => editWorkflow(activeWorkflow.id)}
            onGoHome={goHome}
            onOpenInsights={() => setMode("insights")}
            onRestart={restart}
          />
        )
      ) : (
        <Dashboard
          user={user}
          profiles={profiles}
          workflows={workflows}
          runs={runs}
          progress={progress}
          channels={channels}
          syncStatus={syncStatus}
          onOpenWorkflow={openWorkflow}
          onCreate={createWorkflow}
          onEditWorkflow={editWorkflow}
          onDeleteWorkflow={deleteWorkflow}
          onDuplicateWorkflow={duplicateWorkflow}
          onRestartWorkflow={restartWorkflowById}
          onOpenInsights={() => setMode("insights")}
          onSignOut={signOut}
          onCreateChannel={createChannel}
          onOpenChannel={openChannel}
          onOpenProfile={() => setMode("profile")}
          onOpenDay={openDay}
        />
      )}
    </div>
  );
}

/* ---------------------------- DASHBOARD ---------------------------- */

function Dashboard({ user, profiles, workflows, runs, progress, channels, syncStatus, onOpenWorkflow, onCreate, onEditWorkflow, onDeleteWorkflow, onDuplicateWorkflow, onRestartWorkflow, onOpenInsights, onSignOut, onCreateChannel, onOpenChannel, onOpenProfile, onOpenDay }) {
  const [openMenuId, setOpenMenuId] = useState(null);
  const [confirmId, setConfirmId] = useState(null);
  const [filterUid, setFilterUid] = useState("all");
  const [newChannelOpen, setNewChannelOpen] = useState(false);
  const [newChannelName, setNewChannelName] = useState("");
  const [search, setSearch] = useState("");

  const videosFor = (channelId) => {
    const wfIds = new Set(workflows.filter((w) => w.channelId === channelId).map((w) => w.id));
    return runs.filter((r) => wfIds.has(r.workflowId)).length;
  };
  const editorsFor = (channel) => (channel.memberUids || []).length;
  const submitNewChannel = () => {
    if (!newChannelName.trim()) return;
    onCreateChannel(newChannelName);
    setNewChannelName("");
    setNewChannelOpen(false);
  };

  const teamUids = useMemo(() => {
    const s = new Set(Object.keys(profiles || {}));
    runs.forEach((r) => { if (r.completedByUid) s.add(r.completedByUid); });
    return Array.from(s);
  }, [profiles, runs]);

  const runsFiltered = filterUid === "all" ? runs : runs.filter((r) => r.completedByUid === filterUid);
  const totalRuns = runsFiltered.length;
  const totalTime = runsFiltered.reduce((s, r) => s + r.totalSeconds, 0);
  const workflowsTouched = new Set(runsFiltered.map((r) => r.workflowId)).size;
  const avgSession = totalRuns ? totalTime / totalRuns : 0;

  const runsFor = (wid) => runsFiltered.filter((r) => r.workflowId === wid);
  const lastRunFor = (wid) => {
    const rs = runsFor(wid);
    if (!rs.length) return null;
    return rs.reduce((a, b) => (new Date(a.completedAt) > new Date(b.completedAt) ? a : b));
  };

  const teamStats = useMemo(() => {
    return teamUids.map((tuid) => {
      const rs = runs.filter((r) => r.completedByUid === tuid);
      const time = rs.reduce((s, r) => s + r.totalSeconds, 0);
      const last = rs.length ? rs.reduce((a, b) => (new Date(a.completedAt) > new Date(b.completedAt) ? a : b)) : null;
      return {
        uid: tuid,
        name: displayNameFor(tuid, profiles, (profiles[tuid] && profiles[tuid].email) || (rs[0] && rs[0].completedBy)),
        runs: rs.length,
        time,
        last,
      };
    }).sort((a, b) => b.time - a.time);
  }, [teamUids, runs, profiles]);

  // Daily time totals for the last 14 days, scoped to current filter.
  const dailyData = useMemo(() => {
    const days = [];
    const now = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      days.push({ key, label: d.toLocaleDateString(undefined, { weekday: "narrow" }), value: 0 });
    }
    const map = {};
    days.forEach((d) => { map[d.key] = d; });
    runsFiltered.forEach((r) => {
      const k = dayKey(r.completedAt);
      if (map[k]) map[k].value += r.totalSeconds;
    });
    return days;
  }, [runsFiltered]);

  return (
    <div className="flex-1 flex flex-col max-w-4xl w-full mx-auto px-6 py-8 sm:py-10 overflow-y-auto fade-in">
      <div className="flex items-start justify-between mb-2 flex-wrap gap-3">
        <div>
          <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-1">Workflow Controller</p>
          <h1 style={{ color: COLORS.textPrimary }} className="text-2xl sm:text-3xl font-bold">Home</h1>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={onOpenProfile} className="flex items-center gap-2 hover:opacity-80 transition-opacity" aria-label="Edit profile">
            <div style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs shrink-0">
              {displayNameFor(user.uid, profiles, user.email).slice(0, 1).toUpperCase()}
            </div>
            <span style={{ color: COLORS.textMuted }} className="font-mono text-xs hidden sm:inline truncate max-w-[140px]">{displayNameFor(user.uid, profiles, user.email)}</span>
          </button>
          {syncStatus === "error" && (
            <span style={{ backgroundColor: "rgba(225,90,90,0.14)", color: COLORS.danger }} className="font-mono text-[10px] rounded-full px-2.5 py-1 flex items-center gap-1.5" title="Changes are saved on this device but haven't synced to the cloud yet">
              <span style={{ width: 6, height: 6, borderRadius: 9999, backgroundColor: COLORS.danger, display: "inline-block" }} />
              Offline
            </span>
          )}
          <button onClick={onOpenInsights} aria-label="Insights" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><BarChart2 size={18} /></button>
          <button onClick={() => onOpenDay(new Date().toISOString().slice(0, 10))} aria-label="Today's activity" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><CalendarIcon size={18} /></button>
          <button onClick={onSignOut} aria-label="Sign out" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><LogOut size={18} /></button>
        </div>
      </div>

      {/* Team filter */}
      <div className="flex items-center gap-2 mt-6 mb-4 flex-wrap">
        <Users size={16} style={{ color: COLORS.textFaint }} />
        <select
          value={filterUid}
          onChange={(e) => setFilterUid(e.target.value)}
          style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
          className="rounded-xl border px-3 py-2 text-sm font-medium outline-none focus:ring-2"
        >
          <option value="all">All team members</option>
          {teamStats.map((t) => <option key={t.uid} value={t.uid}>{t.name}</option>)}
        </select>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
        <StatCard label="Runs" value={totalRuns} color={COLORS.textPrimary} />
        <StatCard label="Time tracked" value={formatHours(totalTime)} color={COLORS.orange} />
        <StatCard label="Workflows touched" value={workflowsTouched} color={COLORS.violet} />
        <StatCard label="Avg session" value={formatTime(avgSession)} color={COLORS.teal} />
      </div>

      {/* Daily activity chart */}
      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Work hours, last 14 days</p>
        <DailyBars days={dailyData} color={COLORS.teal} onOpenDay={onOpenDay} />
      </div>

      {/* Channels */}
      <div className="flex items-center justify-between mb-3">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase">Channels</p>
        <button onClick={() => setNewChannelOpen((o) => !o)} style={{ color: COLORS.teal }} className="font-mono text-[11px] tracking-wide hover:opacity-80 flex items-center gap-1">
          <Plus size={13} /> New channel
        </button>
      </div>

      {newChannelOpen && (
        <div className="flex gap-2 mb-4">
          <input value={newChannelName} onChange={(e) => setNewChannelName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submitNewChannel()}
            placeholder="Channel name…" autoFocus
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="flex-1 rounded-xl border px-4 py-2.5 text-sm outline-none focus:ring-2" />
          <button onClick={submitNewChannel} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="rounded-xl px-4 py-2.5 text-sm font-semibold hover:brightness-110 transition-all">Create</button>
        </div>
      )}

      <div className="grid sm:grid-cols-2 gap-4 mb-6">
        {channels.map((ch) => (
          <button key={ch.id} onClick={() => onOpenChannel(ch.id)}
            style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }}
            className="rounded-2xl border p-5 text-left flex items-center gap-4 hover:brightness-110 transition-all">
            <div style={{ backgroundColor: COLORS.violetSoft, color: COLORS.violet }} className="w-11 h-11 rounded-xl flex items-center justify-center shrink-0">
              <ChannelIcon size={20} />
            </div>
            <div className="flex-1 min-w-0">
              <p style={{ color: COLORS.textPrimary }} className="font-semibold truncate">{ch.name}</p>
              <p style={{ color: COLORS.textFaint }} className="font-mono text-xs mt-0.5">{editorsFor(ch)} editor{editorsFor(ch) === 1 ? "" : "s"} · {videosFor(ch.id)} video{videosFor(ch.id) === 1 ? "" : "s"} posted</p>
            </div>
          </button>
        ))}
        {channels.length === 0 && !newChannelOpen && (
          <p style={{ color: COLORS.textFaint }} className="text-sm italic sm:col-span-2 py-2">No channels yet — add one to start tracking editors and output per channel.</p>
        )}
      </div>

      {/* Team breakdown */}
      {filterUid === "all" && teamStats.length > 0 && (
        <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
          <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Team</p>
          <div className="flex flex-col gap-3">
            {teamStats.map((t) => (
              <button key={t.uid} onClick={() => setFilterUid(t.uid)} className="flex items-center gap-3 text-left hover:opacity-80 transition-opacity">
                <div style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                  {t.name.slice(0, 1).toUpperCase()}
                </div>

        <button onClick={onCreate} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal, borderColor: COLORS.teal }}

            <p style={{ color: COLORS.textPrimary }} className="font-semibold mb-2">Delete this workflow?</p>

  );
}

function formatFullDate(key) {
  try {
    const d = new Date(key + "T00:00:00");
    return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  } catch (e) { return key; }
}

function DailyBars({ days, color, onOpenDay }) {
  const [active, setActive] = useState(null);
  const max = Math.max(...days.map((d) => d.value), 1);
  const totalAll = days.reduce((s, d) => s + d.value, 0);
  const shown = active != null ? days[active] : null;

  return (
    <div>
      <div className="flex items-baseline justify-between mb-3">
        <p className="font-mono text-sm" style={{ color: COLORS.textPrimary }}>
          {shown ? formatFullDate(shown.key) : "Last 14 days total"}
        </p>
        <div className="flex items-center gap-3">
          <p className="font-mono text-sm font-bold" style={{ color }}>
            {formatTime(shown ? shown.value : totalAll)}
          </p>
          {shown && onOpenDay && (
            <button onClick={() => onOpenDay(shown.key)} style={{ color: COLORS.teal }} className="font-mono text-[11px] tracking-wide hover:opacity-80 underline underline-offset-2">
              View day
            </button>
          )}
        </div>
      </div>
      <div className="flex items-end gap-1.5" style={{ height: 90 }} onMouseLeave={() => setActive(null)}>
        {days.map((d, i) => {
          const h = Math.max(3, (d.value / max) * 80);
          const isActive = active === i;
          return (
            <button key={i} type="button"
              onMouseEnter={() => setActive(i)}
              onClick={() => (active === i && onOpenDay ? onOpenDay(d.key) : setActive(i))}
              className="flex-1 flex flex-col items-center justify-end gap-1.5 outline-none">
              <div className="w-full rounded-t-sm transition-all duration-150"
                style={{ height: h, backgroundColor: d.value > 0 ? color : "#1c2029", opacity: isActive ? 1 : d.value > 0 ? 0.75 : 1 }} />
              <span className="font-mono text-[9px] transition-colors" style={{ color: isActive ? color : "#3d4250" }}>{d.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function ChannelDashboard({ channel, channels, workflows, runs, profiles, onRename, onDelete, onToggleMember, onOpenWorkflow, onOpenDay, onBack }) {

  const [nameDraft, setNameDraft] = useState(channel ? channel.name : "");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [addOpen, setAddOpen] = useState(false);

  if (!channel) {
    return (
      <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
        <p style={{ color: COLORS.textMuted }} className="mb-4">This channel no longer exists.</p>
        <button onClick={onBack} style={{ backgroundColor: COLORS.teal, color: "#04211D" }} className="rounded-xl px-5 py-2.5 text-sm font-bold">Back to Home</button>
      </div>
    );
  }

  const channelWorkflows = workflows.filter((w) => w.channelId === channel.id);
  const wfIds = new Set(channelWorkflows.map((w) => w.id));
  const channelRuns = runs.filter((r) => wfIds.has(r.workflowId));
  const videosPosted = channelRuns.length;
  const totalTime = channelRuns.reduce((s, r) => s + r.totalSeconds, 0);
  const avgTime = videosPosted ? totalTime / videosPosted : 0;

  const memberUids = channel.memberUids || [];
  const memberStats = memberUids.map((muid) => {
    const rs = channelRuns.filter((r) => r.completedByUid === muid);
    return {
      uid: muid,
      name: displayNameFor(muid, profiles, profiles[muid] && profiles[muid].email),
      videos: rs.length,
      time: rs.reduce((s, r) => s + r.totalSeconds, 0),

  }).sort((a, b) => b.videos - a.videos);

  const allKnownUids = useMemo(() => {
    const s = new Set(Object.keys(profiles || {}));
    runs.forEach((r) => { if (r.completedByUid) s.add(r.completedByUid); });
    return Array.from(s);
  }, [profiles, runs]);
  const nonMembers = allKnownUids.filter((u) => !memberUids.includes(u));

  const dailyData = useMemo(() => {
    const days = [];
    const now = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      days.push({ key, label: d.toLocaleDateString(undefined, { weekday: "narrow" }), value: 0 });
    }
    const map = {};
    days.forEach((d) => { map[d.key] = d; });
    channelRuns.forEach((r) => {
      const k = dayKey(r.completedAt);
      if (map[k]) map[k].value += r.totalSeconds;
    });
    return days;
  }, [channelRuns]);

  const commitName = () => { onRename(channel.id, nameDraft); setEditingName(false); };

  return (
    <div className="flex-1 flex flex-col max-w-4xl w-full mx-auto px-6 py-8 sm:py-10 overflow-y-auto fade-in">
      <div className="flex items-start justify-between mb-6 flex-wrap gap-3">
        <div className="flex items-center gap-3 min-w-0">
          <div style={{ backgroundColor: COLORS.violetSoft, color: COLORS.violet }} className="w-11 h-11 rounded-xl flex items-center justify-center shrink-0">
            <ChannelIcon size={20} />
          </div>
          <div className="min-w-0">
            <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-1">Channel</p>
            {editingName ? (
              <input autoFocus value={nameDraft} onChange={(e) => setNameDraft(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && commitName()} onBlur={commitName}
                style={{ backgroundColor: COLORS.bgElevated, color: COLORS.textPrimary, borderColor: COLORS.border }}
                className="rounded-lg border px-2 py-1 text-xl font-bold outline-none" />
            ) : (
              <h1 onClick={() => setEditingName(true)} style={{ color: COLORS.textPrimary }} className="text-2xl sm:text-3xl font-bold truncate cursor-pointer" title="Click to rename">{channel.name}</h1>
            )}
          </div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <button onClick={() => setConfirmDelete(true)} aria-label="Delete channel" style={{ borderColor: COLORS.border, color: COLORS.danger }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><Trash2 size={18} /></button>
          <button onClick={onBack} aria-label="Home" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><HomeIcon size={18} /></button>

        <StatCard label="Videos posted" value={videosPosted} color={COLORS.textPrimary} />

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Work hours, last 14 days</p>
        <DailyBars days={dailyData} color={COLORS.violet} onOpenDay={onOpenDay} />
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <div className="flex items-center justify-between mb-4">
          <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase">Editors on this channel</p>
          {nonMembers.length > 0 && (
            <button onClick={() => setAddOpen((o) => !o)} style={{ color: COLORS.teal }} className="font-mono text-[11px] tracking-wide hover:opacity-80 flex items-center gap-1">
              <UserPlus size={13} /> Add editor

        {addOpen && (

                {displayNameFor(muid, profiles)}

            ))}
          </div>

        {memberStats.length === 0 ? (
          <p style={{ color: COLORS.textFaint }} className="text-sm italic py-2">No editors assigned yet.</p>
        ) : (

                <div style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                  {m.name.slice(0, 1).toUpperCase()}

                <div className="flex-1 min-w-0">
                  <p style={{ color: COLORS.textPrimary }} className="text-sm font-semibold truncate">{m.name}</p>

                <button onClick={() => onToggleMember(channel.id, m.uid)} aria-label="Remove from channel" style={{ color: COLORS.danger }} className="p-1.5 hover:opacity-70 shrink-0"><X size={16} /></button>
              </div>
            ))}
          </div>
        )}
      </div>

      <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-3">Workflows on this channel</p>
      <div className="grid sm:grid-cols-2 gap-4 mb-4">
        {channelWorkflows.length === 0 && (
          <p style={{ color: COLORS.textFaint }} className="text-sm italic sm:col-span-2">No workflows assigned to this channel yet. Assign one from the workflow's Edit screen.</p>
        )}
        {channelWorkflows.map((w) => {
          const rs = channelRuns.filter((r) => r.workflowId === w.id);
          const last = rs.length ? rs.reduce((a, b) => (new Date(a.completedAt) > new Date(b.completedAt) ? a : b)) : null;
          return (

              <div className="flex-1">

                <p style={{ color: COLORS.textFaint }} className="font-mono text-xs mb-1">{w.steps.length} steps · {rs.length} runs</p>
                <p style={{ color: COLORS.textFaint }} className="font-mono text-xs">{last ? `Last run ${formatDateShort(last.completedAt)}` : "Not started yet"}</p>
              </div>
              <button onClick={() => onOpenWorkflow(w.id)} style={{ backgroundColor: COLORS.teal, color: "#04211D" }}

function ProfileScreen({ user, profiles, onUpdateName, onBack, onSignOut }) {
  const [name, setName] = useState(displayNameFor(user.uid, profiles, user.email));
  const [nameSaved, setNameSaved] = useState(false);
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [pwError, setPwError] = useState("");
  const [pwSuccess, setPwSuccess] = useState(false);
  const [pwBusy, setPwBusy] = useState(false);
  const [resetSent, setResetSent] = useState(false);
  const [teamCode, setTeamCode] = useState("");
  const [teamCodeLoaded, setTeamCodeLoaded] = useState(false);
  const [teamCodeSaved, setTeamCodeSaved] = useState(false);

  useEffect(() => {
    firebase.firestore().collection("public").doc("settings").get()
      .then((snap) => { if (snap.exists) setTeamCode(snap.data().inviteCode || ""); })
      .catch(() => {})
      .finally(() => setTeamCodeLoaded(true));
  }, []);

  const saveTeamCode = async () => {
    try {
      await firebase.firestore().collection("public").doc("settings").set({ inviteCode: teamCode.trim() }, { merge: true });
      setTeamCodeSaved(true);
      setTimeout(() => setTeamCodeSaved(false), 2000);
    } catch (e) {}
  };

  const saveName = async () => {
    await onUpdateName(name);
    setNameSaved(true);
    setTimeout(() => setNameSaved(false), 2000);
  };

  const changePassword = async (e) => {
    e.preventDefault();
    setPwError(""); setPwSuccess(false); setPwBusy(true);
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPw);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPw);
      setPwSuccess(true);
      setCurrentPw(""); setNewPw("");
    } catch (err) {
      setPwError((err && err.message ? err.message : "Something went wrong").replace("Firebase: ", ""));
    }
    setPwBusy(false);
  };

  const sendReset = async () => {
    try {
      await firebase.auth().sendPasswordResetEmail(user.email);
      setResetSent(true);
    } catch (e) {}
  };

  return (
    <div className="flex-1 flex flex-col max-w-lg w-full mx-auto px-6 py-8 sm:py-10 fade-in">
      <ScreenHeader title="Profile" onClose={onBack} />

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-5">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-3">Display name</p>
        <div className="flex gap-2">
          <input value={name} onChange={(e) => setName(e.target.value)}
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="flex-1 rounded-xl border px-4 py-2.5 text-sm outline-none focus:ring-2" />
          <button onClick={saveName} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="rounded-xl px-4 py-2.5 text-sm font-semibold hover:brightness-110 transition-all">
            {nameSaved ? "Saved" : "Save"}
          </button>
        </div>
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] mt-4">Email</p>
        <p style={{ color: COLORS.textMuted }} className="text-sm">{user.email}</p>
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-5">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-3">Change password</p>
        <form onSubmit={changePassword} className="flex flex-col gap-2.5">
          <input type="password" required value={currentPw} onChange={(e) => setCurrentPw(e.target.value)} placeholder="Current password"
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="rounded-xl border px-4 py-2.5 text-sm outline-none focus:ring-2" />
          <input type="password" required minLength={6} value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="New password"
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="rounded-xl border px-4 py-2.5 text-sm outline-none focus:ring-2" />
          {pwError && <p style={{ color: COLORS.danger }} className="text-xs">{pwError}</p>}
          {pwSuccess && <p style={{ color: COLORS.teal }} className="text-xs">Password updated.</p>}
          <button type="submit" disabled={pwBusy} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal, opacity: pwBusy ? 0.6 : 1 }}
            className="rounded-xl py-2.5 text-sm font-semibold hover:brightness-110 transition-all">
            {pwBusy ? "Please wait…" : "Update password"}
          </button>
        </form>
        <button onClick={sendReset} style={{ color: COLORS.textFaint }} className="text-xs mt-3 hover:opacity-80">
          {resetSent ? "Reset email sent — check your inbox" : "Or email me a reset link instead"}
        </button>
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-5">

function DayDetailScreen({ dateKey, workflows, runs, profiles, channels, channelId, onChangeDate, onBack }) {
  const scopedWorkflowIds = channelId ? new Set(workflows.filter((w) => w.channelId === channelId).map((w) => w.id)) : null;
  const dayRuns = useMemo(
    () => runs.filter((r) => dayKey(r.completedAt) === dateKey && (!scopedWorkflowIds || scopedWorkflowIds.has(r.workflowId))),
    [runs, dateKey, channelId]
  );
  const totalTime = dayRuns.reduce((s, r) => s + r.totalSeconds, 0);

  const byEditor = {};
  dayRuns.forEach((r) => {
    const eid = r.completedByUid || "unknown";
    if (!byEditor[eid]) byEditor[eid] = { uid: eid, videos: 0, time: 0 };
    byEditor[eid].videos += 1;
    byEditor[eid].time += r.totalSeconds;
  });
  const editorList = Object.values(byEditor)
    .map((e) => ({ ...e, name: displayNameFor(e.uid, profiles, e.uid === "unknown" ? null : undefined) }))
    .sort((a, b) => b.time - a.time);

  const byChannel = {};
  dayRuns.forEach((r) => {
    const wf = workflows.find((w) => w.id === r.workflowId);
    const chId = (wf && wf.channelId) || "none";
    if (!byChannel[chId]) byChannel[chId] = { id: chId, videos: 0, time: 0 };
    byChannel[chId].videos += 1;
    byChannel[chId].time += r.totalSeconds;
  });
  const channelList = Object.values(byChannel).map((c) => ({
    ...c,
    name: c.id === "none" ? "No channel" : ((channels.find((ch) => ch.id === c.id) || {}).name || "Unknown channel"),
  })).sort((a, b) => b.time - a.time);

  const shiftDay = (delta) => {
    const d = new Date(dateKey + "T00:00:00");
    d.setDate(d.getDate() + delta);
    onChangeDate(d.toISOString().slice(0, 10));
  };

  const isToday = dateKey === new Date().toISOString().slice(0, 10);

  return (
    <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 overflow-y-auto fade-in">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">

        <button onClick={onBack} aria-label="Home" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><HomeIcon size={18} /></button>
      </div>

      <div className="flex items-center gap-2 mb-6 flex-wrap">
        <button onClick={() => shiftDay(-1)} aria-label="Previous day" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><ArrowLeft size={16} /></button>
        <input type="date" value={dateKey} onChange={(e) => onChangeDate(e.target.value)}
          style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
          className="rounded-xl border px-3 py-2 text-sm outline-none focus:ring-2" />
        <button onClick={() => shiftDay(1)} disabled={isToday} aria-label="Next day" style={{ borderColor: COLORS.border, color: COLORS.textMuted, opacity: isToday ? 0.35 : 1 }} className="rounded-full border p-2 hover:opacity-80 transition-opacity disabled:cursor-not-allowed"><ArrowRight size={16} /></button>
        <p style={{ color: COLORS.textFaint }} className="font-mono text-sm ml-1">{formatFullDate(dateKey)}</p>
      </div>

      <div className="grid grid-cols-3 gap-3 mb-6">
        <StatCard label="Videos posted" value={dayRuns.length} color={COLORS.textPrimary} />
        <StatCard label="Time worked" value={formatTime(totalTime)} color={COLORS.orange} />
        <StatCard label="Active editors" value={editorList.length} color={COLORS.violet} />
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-5">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">By editor</p>
        {editorList.length === 0 ? (
