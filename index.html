<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---------------------------------------------------------------
   Workflow Controller v3 — Home dashboard, multiple workflows,
   run history / analytics, and shared cloud sync via Firebase.
----------------------------------------------------------------- */

const COLORS = {
  bg: "#0A0B0E",
  bgElevated: "#121419",
  bgCard: "#161920",
  border: "#262B34",
  textPrimary: "#F4F5F7",
  textMuted: "#8B92A0",
  textFaint: "#565C68",
  teal: "#2DD4C4",
  tealSoft: "rgba(45,212,196,0.14)",
  orange: "#F2784B",
  orangeSoft: "rgba(242,120,75,0.14)",
  danger: "#E15A5A",
};

const DEFAULT_STEPS = [
  "Cut Video", "Transcribe", "Update Names", "Export As Text File",
  "Upload in Grok with prompt", "Headline Update", "Date Update",
  "Name Plate Update", "Pick Thumbnail Frames", "Export Video",
  "Create Thumbnail", "Upload Video", "Paste Metadata",
  "Check for Ad Suitability", "Submit Ad Rating",
];

function uid() { return Math.random().toString(36).slice(2, 10); }

function makeDefaultWorkflow() {
  return { id: uid(), title: "Video Publishing Workflow", steps: DEFAULT_STEPS.map((t) => ({ id: uid(), text: t })) };
}

function formatTime(totalSeconds) {
  const s = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
}

function formatDateShort(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " " +
      d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  } catch (e) { return ""; }
}

/* ------------------------- Local storage ------------------------- */
const K_WORKFLOWS = "wfc_workflows_v2";
const K_ACTIVE = "wfc_active_v2";
const K_PROGRESS = "wfc_progress_v2";
const K_RUNS = "wfc_runs_v2";

function lsGet(key) { try { return window.localStorage.getItem(key); } catch (e) { return null; } }
function lsSet(key, value) { try { window.localStorage.setItem(key, value); } catch (e) {} }

function migrateLegacy() {
  const legacyWf = lsGet("wfc_workflow");
  if (!legacyWf) return null;
  try {
    const parsed = JSON.parse(legacyWf);
    const steps = (parsed.steps || []).map((s) => (typeof s === "string" ? { id: uid(), text: s } : { id: s.id || uid(), text: s.text }));
    const wf = { id: uid(), title: parsed.title || "My Workflow", steps };
    const idx = parseInt(lsGet("wfc_currentStepIndex") || "0", 10) || 0;
    const done = lsGet("wfc_isComplete") === "true";
    let times = {};
    try { times = JSON.parse(lsGet("wfc_stepTimes") || "{}"); } catch (e) {}
    return { workflow: wf, stepIndex: idx, isComplete: done, stepTimes: times };
  } catch (e) { return null; }
}

/* ============================ AUTH ============================ */

function LoginScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setBusy(true);
    try {
      if (mode === "signin") {
        await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
      } else {
        await firebase.auth().createUserWithEmailAndPassword(email.trim(), password);
      }
    } catch (err) {
      setError((err && err.message ? err.message : "Something went wrong").replace("Firebase: ", ""));
    }
    setBusy(false);
  };

  return (
    <div style={{ backgroundColor: COLORS.bg }} className="min-h-screen w-full flex items-center justify-center px-6">
      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="w-full max-w-sm rounded-2xl border p-8 fade-in">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-2">Workflow Controller</p>
        <h1 style={{ color: COLORS.textPrimary }} className="text-2xl font-bold mb-6">{mode === "signin" ? "Sign in" : "Create account"}</h1>
        <form onSubmit={submit} className="flex flex-col gap-3">
          <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email"
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
          <input type="password" required minLength={6} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password"
            style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
            className="rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
          {error && <p style={{ color: COLORS.danger }} className="text-xs">{error}</p>}
          <button type="submit" disabled={busy} style={{ backgroundColor: COLORS.teal, color: "#04211D", opacity: busy ? 0.6 : 1 }}
            className="rounded-xl py-3 text-sm font-bold mt-2 transition-all active:scale-[0.98]">
            {busy ? "Please wait…" : mode === "signin" ? "Sign In" : "Create Account"}
          </button>
        </form>
        <button onClick={() => { setMode(mode === "signin" ? "signup" : "signin"); setError(""); }} style={{ color: COLORS.textMuted }} className="text-xs mt-5 w-full text-center hover:opacity-80">
          {mode === "signin" ? "New here? Create an account" : "Already have an account? Sign in"}
        </button>
        <p style={{ color: COLORS.textFaint }} className="text-[11px] mt-6 text-center leading-relaxed">
          You and anyone else who signs in here share the same workflows and run history.
        </p>
      </div>
    </div>
  );
}

function Root() {
  const [authUser, setAuthUser] = useState(undefined);

  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged((u) => setAuthUser(u || null));
    return unsub;
  }, []);

  if (authUser === undefined) {
    return (
      <div style={{ backgroundColor: COLORS.bg, color: COLORS.textMuted }} className="min-h-screen w-full flex items-center justify-center font-mono text-sm tracking-widest">
        LOADING…
      </div>
    );
  }
  if (!authUser) return <LoginScreen />;
  return <WorkflowController user={authUser} />;
}

/* ======================= MAIN APP ======================= */

function WorkflowController({ user }) {
  const [workflows, setWorkflows] = useState(null);
  const [activeId, setActiveId] = useState(null);
  const [progress, setProgress] = useState({});
  const [runs, setRuns] = useState([]);
  const [mode, setMode] = useState("dashboard"); // dashboard | run | edit | insights
  const [editingId, setEditingId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [direction, setDirection] = useState("forward");
  const [animKey, setAnimKey] = useState(0);
  const [paused, setPaused] = useState(false);
  const [, forceTick] = useState(0);
  const segmentStartRef = useRef(Date.now());
  const saveTimer = useRef(null);
  const isRemoteRef = useRef(false);

  // ---- Local load first (instant + offline fallback) ----
  useEffect(() => {
    let wfs = null, active = null, prog = {}, runHistory = [];
    const rawWfs = lsGet(K_WORKFLOWS);
    if (rawWfs) { try { wfs = JSON.parse(rawWfs); } catch (e) {} }
    if (!wfs || !wfs.length) {
      const migrated = migrateLegacy();
      if (migrated) {
        wfs = [migrated.workflow];
        prog[migrated.workflow.id] = { stepIndex: migrated.stepIndex, isComplete: migrated.isComplete, stepTimes: migrated.stepTimes };
      } else {
        wfs = [makeDefaultWorkflow()];
      }
    }
    active = lsGet(K_ACTIVE) || wfs[0].id;
    if (!wfs.find((w) => w.id === active)) active = wfs[0].id;

    const rawProg = lsGet(K_PROGRESS);
    if (rawProg) { try { prog = { ...prog, ...JSON.parse(rawProg) }; } catch (e) {} }
    const rawRuns = lsGet(K_RUNS);
    if (rawRuns) { try { runHistory = JSON.parse(rawRuns); } catch (e) {} }

    setWorkflows(wfs);
    setActiveId(active);
    setProgress(prog);
    setRuns(runHistory);
    segmentStartRef.current = Date.now();
    setLoaded(true);
  }, []);

  // ---- Cloud sync: subscribe once local state is ready ----
  useEffect(() => {
    if (!loaded) return;
    const docRef = firebase.firestore().collection("sharedData").doc("workflowController");
    const unsub = docRef.onSnapshot(
      (snap) => {
        if (snap.exists) {
          const data = snap.data();
          isRemoteRef.current = true;
          if (data.workflows) setWorkflows(data.workflows);
          if (data.activeId) setActiveId(data.activeId);
          if (data.progress) setProgress(data.progress);
          if (data.runs) setRuns(data.runs);
        } else {
          docRef.set({
            workflows, activeId, progress, runs,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: user.email,
          }).catch(() => {});
        }
      },
      () => {}
    );
    return unsub;
    // eslint-disable-next-line
  }, [loaded]);

  const persistNow = useCallback((wfs, active, prog, runHistory) => {
    lsSet(K_WORKFLOWS, JSON.stringify(wfs));
    lsSet(K_ACTIVE, active);
    lsSet(K_PROGRESS, JSON.stringify(prog));
    lsSet(K_RUNS, JSON.stringify(runHistory));
    if (isRemoteRef.current) { isRemoteRef.current = false; return; }
    firebase.firestore().collection("sharedData").doc("workflowController").set({
      workflows: wfs, activeId: active, progress: prog, runs: runHistory,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: user.email,
    }).catch(() => {});
  }, [user]);

  const persist = useCallback((wfs, active, prog, runHistory) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => persistNow(wfs, active, prog, runHistory), 400);
  }, [persistNow]);

  useEffect(() => {
    if (!loaded) return;
    persist(workflows, activeId, progress, runs);
  }, [workflows, activeId, progress, runs, loaded, persist]);

  useEffect(() => {
    if (!loaded) return;
    const id = setInterval(() => persistNow(workflows, activeId, progress, runs), 5000);
    return () => clearInterval(id);
  }, [loaded, workflows, activeId, progress, runs, persistNow]);

  const activeWorkflow = useMemo(() => {
    if (!workflows) return null;
    return workflows.find((w) => w.id === activeId) || workflows[0];
  }, [workflows, activeId]);

  const activeProgress = (activeWorkflow && progress[activeWorkflow.id]) || { stepIndex: 0, isComplete: false, stepTimes: {} };
  const stepIndex = activeProgress.stepIndex || 0;
  const isComplete = !!activeProgress.isComplete;
  const stepTimes = activeProgress.stepTimes || {};

  const updateActiveProgress = (updater) => {
    setProgress((prev) => {
      const cur = prev[activeWorkflow.id] || { stepIndex: 0, isComplete: false, stepTimes: {} };
      const next = updater(cur);
      return { ...prev, [activeWorkflow.id]: next };
    });
  };

  useEffect(() => {
    if (!loaded || mode !== "run" || isComplete || paused || !activeWorkflow) return;
    const id = setInterval(() => forceTick((t) => t + 1), 1000);
    return () => clearInterval(id);
  }, [loaded, mode, isComplete, paused, activeWorkflow]);

  const currentStepId = activeWorkflow && activeWorkflow.steps[stepIndex] ? activeWorkflow.steps[stepIndex].id : null;

  const liveSecondsForCurrent = () => {
    if (!currentStepId) return 0;
    const base = stepTimes[currentStepId] || 0;
    if (paused || isComplete) return base;
    return base + (Date.now() - segmentStartRef.current) / 1000;
  };

  const finalizeCurrentSegment = (times) => {
    if (!currentStepId || paused) return times;
    const elapsed = (Date.now() - segmentStartRef.current) / 1000;
    return { ...times, [currentStepId]: (times[currentStepId] || 0) + elapsed };
  };

  const totalSecondsNow = () => {
    if (!activeWorkflow) return 0;
    let sum = 0;
    for (const s of activeWorkflow.steps) sum += s.id === currentStepId ? 0 : (stepTimes[s.id] || 0);
    return sum + liveSecondsForCurrent();
  };

  const recordRun = (finalTimes) => {
    if (!activeWorkflow) return;
    const total = activeWorkflow.steps.reduce((sum, s) => sum + (finalTimes[s.id] || 0), 0);
    const stepLabels = {};
    activeWorkflow.steps.forEach((s) => { stepLabels[s.id] = s.text; });
    const run = {
      id: uid(),
      workflowId: activeWorkflow.id,
      workflowTitle: activeWorkflow.title,
      completedAt: new Date().toISOString(),
      completedBy: user.email,
      totalSeconds: total,
      stepTimes: finalTimes,
      stepLabels,
      stepOrder: activeWorkflow.steps.map((s) => s.id),
    };
    setRuns((r) => [...r, run]);
  };

  const goNext = () => {
    if (!activeWorkflow) return;
    updateActiveProgress((cur) => {
      const updatedTimes = finalizeCurrentSegment(cur.stepTimes || {});
      segmentStartRef.current = Date.now();
      if ((cur.stepIndex || 0) >= activeWorkflow.steps.length - 1) {
        recordRun(updatedTimes);
        return { ...cur, stepTimes: updatedTimes, isComplete: true };
      }
      setDirection("forward"); setAnimKey((k) => k + 1);
      return { ...cur, stepTimes: updatedTimes, stepIndex: Math.min((cur.stepIndex || 0) + 1, activeWorkflow.steps.length - 1) };
    });
  };

  const goBack = () => {
    updateActiveProgress((cur) => {
      const updatedTimes = finalizeCurrentSegment(cur.stepTimes || {});
      segmentStartRef.current = Date.now();
      setDirection("backward"); setAnimKey((k) => k + 1);
      return { ...cur, stepTimes: updatedTimes, stepIndex: Math.max((cur.stepIndex || 0) - 1, 0) };
    });
  };

  const togglePause = () => {
    updateActiveProgress((cur) => {
      if (!paused) {
        const updatedTimes = finalizeCurrentSegment(cur.stepTimes || {});
        setPaused(true);
        return { ...cur, stepTimes: updatedTimes };
      } else {
        segmentStartRef.current = Date.now();
        setPaused(false);
        return cur;
      }
    });
  };

  const restart = () => {
    setDirection("forward"); setAnimKey((k) => k + 1);
    setPaused(false);
    segmentStartRef.current = Date.now();
    updateActiveProgress(() => ({ stepIndex: 0, isComplete: false, stepTimes: {} }));
  };

  const openWorkflow = (id) => {
    setActiveId(id);
    setPaused(false);
    segmentStartRef.current = Date.now();
    setMode("run");
  };

  const createWorkflow = () => { setEditingId("new"); setMode("edit"); };
  const editWorkflow = (id) => { setEditingId(id); setMode("edit"); };

  const deleteWorkflow = (id) => {
    setWorkflows((wfs) => {
      const next = wfs.filter((w) => w.id !== id);
      const finalList = next.length ? next : [makeDefaultWorkflow()];
      if (activeId === id) setActiveId(finalList[0].id);
      return finalList;
    });
    setProgress((p) => { const c = { ...p }; delete c[id]; return c; });
  };

  const saveWorkflow = (wfData) => {
    setWorkflows((wfs) => {
      const exists = wfs.find((w) => w.id === wfData.id);
      if (exists) return wfs.map((w) => (w.id === wfData.id ? wfData : w));
      return [...wfs, wfData];
    });
    if (editingId === "new") setActiveId(wfData.id);
    setMode("run");
    setEditingId(null);
  };

  useEffect(() => {
    if (mode !== "run" || !loaded) return;
    const onKey = (e) => {
      if (isComplete) return;
      if (e.code === "Space") { e.preventDefault(); togglePause(); }
      else if (e.code === "ArrowRight") { e.preventDefault(); if (!paused) goNext(); }
      else if (e.code === "ArrowLeft") { e.preventDefault(); if (!paused) goBack(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
    // eslint-disable-next-line
  }, [mode, loaded, isComplete, paused, stepIndex, activeWorkflow]);

  if (!loaded || !workflows || !activeWorkflow) {
    return (
      <div style={{ backgroundColor: COLORS.bg, color: COLORS.textMuted }} className="min-h-screen w-full flex items-center justify-center font-mono text-sm tracking-widest">
        LOADING…
      </div>
    );
  }

  const total = activeWorkflow.steps.length;
  const goHome = () => setMode("dashboard");
  const signOut = () => firebase.auth().signOut();

  return (
    <div style={{ backgroundColor: COLORS.bg, color: COLORS.textPrimary }} className="min-h-screen w-full flex flex-col font-sans">
      {mode === "edit" ? (
        <EditMode
          workflow={editingId === "new" ? { id: uid(), title: "", steps: [] } : workflows.find((w) => w.id === editingId)}
          isNew={editingId === "new"}
          stepTimes={editingId === "new" ? {} : (progress[editingId] && progress[editingId].stepTimes) || {}}
          onSave={saveWorkflow}
          onCancel={() => { setMode("dashboard"); setEditingId(null); }}
        />
      ) : mode === "insights" ? (
        <InsightsScreen workflows={workflows} activeId={activeId} runs={runs} onSelectWorkflow={setActiveId} onClose={goHome} />
      ) : mode === "run" ? (
        isComplete ? (
          <CompleteScreen workflow={activeWorkflow} stepTimes={stepTimes} totalSeconds={totalSecondsNow()} onRestart={restart} onEdit={() => editWorkflow(activeWorkflow.id)} onInsights={() => setMode("insights")} onGoHome={goHome} />
        ) : (
          <RunMode
            workflow={activeWorkflow} stepIndex={stepIndex} total={total} direction={direction} animKey={animKey}
            paused={paused} currentSeconds={liveSecondsForCurrent()} totalSeconds={totalSecondsNow()}
            onNext={goNext} onBack={goBack} onTogglePause={togglePause}
            onEdit={() => editWorkflow(activeWorkflow.id)}
            onGoHome={goHome}
            onOpenInsights={() => setMode("insights")}
          />
        )
      ) : (
        <Dashboard
          user={user}
          workflows={workflows}
          runs={runs}
          onOpenWorkflow={openWorkflow}
          onCreate={createWorkflow}
          onEditWorkflow={editWorkflow}
          onDeleteWorkflow={deleteWorkflow}
          onOpenInsights={() => setMode("insights")}
          onSignOut={signOut}
        />
      )}
    </div>
  );
}

function LineSpark({ points, width = 560, height = 120, color }) {
  if (!points.length) return null;
  const max = Math.max(...points, 1);
  const min = Math.min(...points, 0);
  const range = Math.max(max - min, 1);
  const stepX = points.length > 1 ? width / (points.length - 1) : width;
  const coords = points.map((v, i) => {
    const x = points.length > 1 ? i * stepX : width / 2;
    const y = height - ((v - min) / range) * (height - 16) - 8;
    return [x, y];
  });
  const pathD = coords.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
  const areaD = `${pathD} L${coords[coords.length - 1][0].toFixed(1)},${height} L0,${height} Z`;
  const gid = "grad-" + Math.random().toString(36).slice(2, 8);

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaD} fill={`url(#${gid})`} stroke="none" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {coords.map(([x, y], i) => <circle key={i} cx={x} cy={y} r="3" fill={color} />)}
    </svg>
  );
}

function InsightsScreen({ workflows, activeId, runs, onSelectWorkflow, onClose }) {
  const wf = workflows.find((w) => w.id === activeId) || workflows[0];
  const wfRuns = useMemo(
    () => runs.filter((r) => r.workflowId === wf.id).sort((a, b) => new Date(a.completedAt) - new Date(b.completedAt)),
    [runs, wf.id]
  );

  if (wfRuns.length === 0) {
    return (
      <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 fade-in">
        <ScreenHeader title="Insights" onClose={onClose} />
        <WorkflowSelect workflows={workflows} activeId={wf.id} onSelect={onSelectWorkflow} />
        <div className="flex-1 flex flex-col items-center justify-center text-center py-16">
          <Timer size={32} style={{ color: COLORS.textFaint }} className="mb-4" />
          <p style={{ color: COLORS.textMuted }} className="text-lg font-semibold mb-1">No runs yet</p>
          <p style={{ color: COLORS.textFaint }} className="text-sm max-w-sm">Complete this workflow once to start seeing trends, averages, and per-step breakdowns here.</p>
        </div>
      </div>
    );
  }

  const totals = wfRuns.map((r) => r.totalSeconds);
  const avgTotal = totals.reduce((a, b) => a + b, 0) / totals.length;
  const fastest = Math.min(...totals);
  const slowest = Math.max(...totals);

  const stepAgg = {};
  wfRuns.forEach((r) => {
    (r.stepOrder || Object.keys(r.stepTimes)).forEach((sid) => {
      const t = r.stepTimes[sid];
      if (t == null) return;
      if (!stepAgg[sid]) stepAgg[sid] = { label: r.stepLabels[sid] || "Step", total: 0, count: 0 };
      stepAgg[sid].total += t;
      stepAgg[sid].count += 1;
    });
  });
  const stepAvgs = Object.values(stepAgg)
    .map((s) => ({ label: s.label, avg: s.total / s.count }))
    .sort((a, b) => b.avg - a.avg);
  const maxStepAvg = Math.max(...stepAvgs.map((s) => s.avg), 1);

  const recent = [...wfRuns].reverse().slice(0, 8);

  return (
    <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 overflow-y-auto fade-in">
      <ScreenHeader title="Insights" onClose={onClose} />
      <WorkflowSelect workflows={workflows} activeId={wf.id} onSelect={onSelectWorkflow} />

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
        <StatCard label="Runs" value={wfRuns.length} color={COLORS.textPrimary} />
        <StatCard label="Avg time" value={formatTime(avgTotal)} color={COLORS.teal} />
        <StatCard label="Fastest" value={formatTime(fastest)} color={COLORS.teal} />
        <StatCard label="Slowest" value={formatTime(slowest)} color={COLORS.orange} />
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Total time per run</p>
        <LineSpark points={totals} color={COLORS.teal} />
        <div className="flex justify-between mt-2">
          <span style={{ color: COLORS.textFaint }} className="font-mono text-[11px]">Run 1</span>
          <span style={{ color: COLORS.textFaint }} className="font-mono text-[11px]">Run {wfRuns.length}</span>
        </div>
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-6">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Average time per step (slowest first)</p>
        <div className="flex flex-col gap-3">
          {stepAvgs.map((s, i) => (
            <div key={i} className="flex items-center gap-3">
              <span style={{ color: COLORS.textMuted }} className="text-sm flex-1 truncate" title={s.label}>{s.label}</span>
              <div className="w-28 h-1.5 rounded-full shrink-0" style={{ backgroundColor: COLORS.border }}>
                <div className="h-1.5 rounded-full" style={{ width: `${Math.max(4, (s.avg / maxStepAvg) * 100)}%`, backgroundColor: COLORS.orange }} />
              </div>
              <span style={{ color: COLORS.orange }} className="font-mono text-xs w-14 text-right shrink-0">{formatTime(s.avg)}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border p-5 mb-4">
        <p style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-4">Recent runs</p>
        <div className="flex flex-col gap-2">
          {recent.map((r) => (
            <div key={r.id} className="flex items-center justify-between gap-3">
              <span style={{ color: COLORS.textMuted }} className="font-mono text-xs truncate">{formatDateShort(r.completedAt)}{r.completedBy ? ` · ${r.completedBy.split("@")[0]}` : ""}</span>
              <span style={{ color: COLORS.textPrimary }} className="font-mono text-xs font-semibold shrink-0">{formatTime(r.totalSeconds)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScreenHeader({ title, onClose }) {
  return (
    <div className="flex items-center justify-between mb-6">
      <h2 style={{ color: COLORS.textPrimary }} className="text-2xl sm:text-3xl font-bold">{title}</h2>
      <button onClick={onClose} aria-label="Close" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><X size={18} /></button>
    </div>
  );
}

function WorkflowSelect({ workflows, activeId, onSelect }) {
  return (
    <select
      value={activeId}
      onChange={(e) => onSelect(e.target.value)}
      style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
      className="rounded-xl border px-4 py-2.5 text-sm font-medium mb-6 outline-none focus:ring-2 w-full sm:w-auto"
    >
      {workflows.map((w) => <option key={w.id} value={w.id}>{w.title || "Untitled workflow"}</option>)}
    </select>
  );
}

function StatCard({ label, value, color }) {
  return (
    <div style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="rounded-2xl border px-4 py-4">
      <p style={{ color: COLORS.textFaint }} className="font-mono text-[10px] tracking-[0.15em] uppercase mb-1">{label}</p>
      <p style={{ color }} className="text-xl font-bold font-mono">{value}</p>
    </div>
  );
}

/* -------------------------- EDIT MODE -------------------------- */

function EditMode({ workflow, isNew, stepTimes, onSave, onCancel }) {
  const [title, setTitle] = useState(workflow.title);
  const [steps, setSteps] = useState(workflow.steps.map((s) => ({ id: s.id, text: s.text })));
  const [newStep, setNewStep] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editingText, setEditingText] = useState("");

  const addStep = () => {
    const text = newStep.trim();
    if (!text) return;
    setSteps((s) => [...s, { id: uid(), text }]);
    setNewStep("");
  };
  const removeStep = (id) => setSteps((s) => s.filter((st) => st.id !== id));
  const move = (id, dir) => {
    setSteps((s) => {
      const idx = s.findIndex((st) => st.id === id);
      const swapWith = idx + dir;
      if (swapWith < 0 || swapWith >= s.length) return s;
      const copy = [...s];
      [copy[idx], copy[swapWith]] = [copy[swapWith], copy[idx]];
      return copy;
    });
  };
  const startEdit = (st) => { setEditingId(st.id); setEditingText(st.text); };
  const commitEdit = () => {
    setSteps((s) => s.map((st) => (st.id === editingId ? { ...st, text: editingText.trim() || st.text } : st)));
    setEditingId(null); setEditingText("");
  };
  const canSave = title.trim().length > 0 && steps.length > 0;
  const handleSave = () => {
    if (!canSave) return;
    onSave({ id: workflow.id, title: title.trim(), steps });
  };

  return (
    <div className="flex-1 flex flex-col max-w-3xl w-full mx-auto px-6 py-8 sm:py-10 fade-in">
      <div className="flex items-center justify-between mb-8">
        <h2 style={{ color: COLORS.textPrimary }} className="text-2xl sm:text-3xl font-bold">{isNew ? "New Workflow" : "Edit Workflow"}</h2>
        <button onClick={onCancel} aria-label="Cancel" style={{ borderColor: COLORS.border, color: COLORS.textMuted }} className="rounded-full border p-2 hover:opacity-80 transition-opacity"><X size={18} /></button>
      </div>

      <label style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-2">Title</label>
      <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Workflow title"
        style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
        className="w-full rounded-xl border px-4 py-3 mb-8 text-lg font-semibold outline-none focus:ring-2" />

      <label style={{ color: COLORS.textFaint }} className="font-mono text-[11px] tracking-[0.2em] uppercase mb-3">Steps ({steps.length})</label>

      <div className="flex flex-col gap-2 mb-4">
        {steps.length === 0 && <p style={{ color: COLORS.textFaint }} className="text-sm italic py-4 text-center">No steps yet. Add your first step below.</p>}
        {steps.map((st, i) => {
          const t = stepTimes[st.id];
          return (
            <div key={st.id} style={{ backgroundColor: COLORS.bgCard, borderColor: COLORS.border }} className="flex items-center gap-2 rounded-xl border px-3 py-2.5">
              <GripVertical size={16} style={{ color: COLORS.textFaint }} className="shrink-0" />
              <span style={{ color: COLORS.textFaint }} className="font-mono text-xs w-6 shrink-0">{String(i + 1).padStart(2, "0")}</span>
              {editingId === st.id ? (
                <input autoFocus value={editingText} onChange={(e) => setEditingText(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && commitEdit()} onBlur={commitEdit}
                  style={{ backgroundColor: COLORS.bgElevated, color: COLORS.textPrimary }}
                  className="flex-1 rounded-lg px-3 py-1.5 text-sm outline-none" />
              ) : (
                <button onClick={() => startEdit(st)} style={{ color: COLORS.textPrimary }} className="flex-1 text-left text-sm py-1.5 truncate" title="Click to edit">{st.text}</button>
              )}
              {t != null && <span style={{ color: COLORS.orange }} className="font-mono text-[11px] shrink-0">{formatTime(t)}</span>}
              <div className="flex items-center gap-1 shrink-0">
                <button onClick={() => move(st.id, -1)} disabled={i === 0} aria-label="Move up" style={{ color: COLORS.textMuted, opacity: i === 0 ? 0.3 : 1 }} className="p-1.5 hover:opacity-70 disabled:cursor-not-allowed"><ChevronUp size={16} /></button>
                <button onClick={() => move(st.id, 1)} disabled={i === steps.length - 1} aria-label="Move down" style={{ color: COLORS.textMuted, opacity: i === steps.length - 1 ? 0.3 : 1 }} className="p-1.5 hover:opacity-70 disabled:cursor-not-allowed"><ChevronDown size={16} /></button>
                <button onClick={() => removeStep(st.id)} aria-label="Delete step" style={{ color: COLORS.danger }} className="p-1.5 hover:opacity-70"><Trash2 size={16} /></button>
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex gap-2 mb-10">
        <input value={newStep} onChange={(e) => setNewStep(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addStep()}
          placeholder="Add a new step…" style={{ backgroundColor: COLORS.bgElevated, borderColor: COLORS.border, color: COLORS.textPrimary }}
          className="flex-1 rounded-xl border px-4 py-3 text-sm outline-none focus:ring-2" />
        <button onClick={addStep} style={{ backgroundColor: COLORS.tealSoft, color: COLORS.teal }} className="flex items-center gap-1.5 rounded-xl px-4 py-3 text-sm font-semibold hover:brightness-110 transition-all">
          <Plus size={16} /> Add
        </button>
      </div>

      <div className="mt-auto flex gap-3 sticky bottom-0 pt-4">
        <button onClick={onCancel} style={{ borderColor: COLORS.border, color: COLORS.textMuted, backgroundColor: COLORS.bg }} className="flex-1 rounded-2xl border py-4 text-base font-semibold hover:opacity-80 transition-opacity">Cancel</button>
        <button onClick={handleSave} disabled={!canSave} style={{ backgroundColor: COLORS.teal, color: "#04211D", opacity: canSave ? 1 : 0.4 }}
          className="flex-[1.4] flex items-center justify-center gap-2 rounded-2xl py-4 text-base font-bold transition-all duration-200 active:scale-[0.98] disabled:cursor-not-allowed">
          <Check size={18} /> Save Workflow
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
